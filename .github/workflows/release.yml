name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/terraform-ci.yml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect merged PR associated with commit
        id: pr
        uses: actions/github-script@v7
        env:
          SHA: ${{ github.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = process.env.SHA;

            const pullRequests = await github.paginate(
              github.rest.repos.listPullRequestsAssociatedWithCommit,
              {
                owner,
                repo,
                commit_sha: commitSha,
              }
            );

            const mergedPr = pullRequests.find((pr) => pr.base.ref === "main" && pr.merged_at);

            if (!mergedPr) {
              core.info(`No merged PR associated with commit ${commitSha}.`);
              core.setOutput("found", "false");
              core.setOutput("bump", "patch");
              return;
            }

            const labels = (mergedPr.labels || []).map((label) => {
              const name = typeof label === "string" ? label : label.name;
              return String(name || "").toLowerCase();
            });

            let bump = "patch";
            if (labels.includes("release:major") || labels.includes("semver:major")) {
              bump = "major";
            } else if (labels.includes("release:minor") || labels.includes("semver:minor")) {
              bump = "minor";
            }

            core.setOutput("found", "true");
            core.setOutput("number", String(mergedPr.number));
            core.setOutput("title", mergedPr.title || "");
            core.setOutput("bump", bump);

      - name: Skip non-PR pushes
        if: steps.pr.outputs.found != 'true'
        run: |
          echo "Push to main without merged PR association. Skipping release creation."

      - name: Compute next semantic version tag
        if: steps.pr.outputs.found == 'true'
        id: semver
        run: |
          set -euo pipefail
          git fetch --force --tags

          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version}"

          case "${{ steps.pr.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            *)
              patch=$((patch + 1))
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"

          if git rev-parse --verify "refs/tags/${new_tag}" >/dev/null 2>&1; then
            echo "Tag ${new_tag} already exists."
            exit 1
          fi

          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "new_tag=${new_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create and push annotated tag
        if: steps.pr.outputs.found == 'true'
        env:
          NEW_TAG: ${{ steps.semver.outputs.new_tag }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
        run: |
          set -euo pipefail

          GIT_AUTHOR_NAME="github-actions[bot]" \
          GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          GIT_COMMITTER_NAME="github-actions[bot]" \
          GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG} from PR #${PR_NUMBER}: ${PR_TITLE}"

          git push origin "${NEW_TAG}"

      - name: Ensure release does not already exist
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.semver.outputs.new_tag }}
        with:
          script: |
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.TAG,
              });

              core.setFailed(
                `Release for tag ${process.env.TAG} already exists: ${response.data.html_url}`,
              );
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Create release
        if: steps.pr.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.new_tag }}
          generate_release_notes: true
          prerelease: false
